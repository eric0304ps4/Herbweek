<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026中藥周 - 活動報到</title>
    <style>
        /* 視覺風格：羊皮紙與古風 */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #4a3728;
        }

        .scroll-container {
            background: #f4e4bc; /* 羊皮紙色 */
            border: 8px solid #8b4513;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding: 40px;
            width: 350px;
            text-align: center;
            border-radius: 5px;
            position: relative;
        }

        h1 {
            color: #2d5a27; /* 墨草綠 */
            font-size: 24px;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 10px;
        }

        .input-group {
            margin: 25px 0;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #8b4513;
            background: rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background: #8b4513;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            border-radius: 3px;
        }

        button:hover {
            background: #2d5a27;
            transform: scale(1.05);
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="scroll-container">
    <h1>2026中藥周</h1>
    <p>—— 活動報到處 ——</p>
    
    <div class="input-group">
        <label>輸入姓名</label>
        <input type="text" id="username" placeholder="例：陳品翰大帥哥">
    </div>

    <div class="input-group">
        <label>輸入系級</label>
        <input type="text" id="grade" placeholder="中醫一">
    </div>
    
    <div class="input-group" style="display:none;"> <input type="number" id="score" value="0">
    </div>

    <button onclick="submitData()">準備好了嗎？點擊我後活動開始</button>
    
    <div id="status"></div>
</div>

<script>
    // 請貼上你剛剛在 Google Apps Script 複製的 URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyY3ScAVhA57OcmUW4QFHmJ2Ofd5MJr06legZXizVtpQwyKZgM5CzYeQS7bNQvmcXB5/exec";

    async function submitData() {
        const name = document.getElementById('username').value;
        const grade = document.getElementById('grade');
        const status = document.getElementById('status');

        if (!name) {
            alert("請先輸入姓名！");
            return;
        }

        status.innerText = "資料傳送中...";

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ name: name, score: parseInt(score) })
            });
            
            status.innerHTML = "<span style='color:green'>報到成功！少俠請進。</span>";
            // 延遲跳轉到排行榜頁面（如果有的話）
            // window.location.href = "leaderboard.html";
        } catch (error) {
            status.innerHTML = "<span style='color:red'>傳輸中斷，請確認靈力連線。</span>";
            console.error(error);
        }
    }
</script>

</body>
</html>
