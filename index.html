<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026中藥周 - 活動報到</title>
    <style>
        /* 視覺風格：羊皮紙與古風 */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #4a3728;
        }

        .scroll-container {
            background: #f4e4bc; /* 羊皮紙色 */
            border: 8px solid #8b4513;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding: 40px;
            width: 350px;
            text-align: center;
            border-radius: 5px;
            position: relative;
        }

        h1 {
            color: #2d5a27; /* 墨草綠 */
            font-size: 24px;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 10px;
        }

        .input-group {
            margin: 25px 0;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #8b4513;
            background: rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background: #8b4513;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            border-radius: 3px;
        }

        button:hover {
            background: #2d5a27;
            transform: scale(1.05);
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="scroll-container">
    <h1>2026中藥周</h1>
    <p>—— 活動報到處 ——</p>
    
    <div class="input-group">
        <label>輸入姓名</label>
        <input type="text" id="username" placeholder="例：陳品翰大帥哥">
    </div>

    <div class="input-group">
        <label>輸入系級</label>
        <input type="text" id="grade" placeholder="中醫一">
    </div>
    
    <div class="input-group" style="display:none;"> <input type="number" id="score" value="0">
    </div>

    <button onclick="submitData()">準備好了嗎？活動馬上開始</button>
    
    <div id="status"></div>
</div>

<script>
    // 你的 Google Apps Script 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzoTKL1mQIXwvj6EntDV-CCUqGVmZVS_H_zy_3VX6zv1Z23RGxV2s8cVJTrOLNQcTS-/exec";

    async function submitData() {
        // 1. 抓取 HTML 元素
        const nameInput = document.getElementById('username');
        const gradeInput = document.getElementById('grade');
        const scoreInput = document.getElementById('score');
        const status = document.getElementById('status');

        // 2. 取得數值
        const name = nameInput.value;
        const grade = gradeInput.value;
        const score = scoreInput.value;

        // 3. 檢查必填欄位
        if (!name || !grade) {
            alert("請先輸入姓名與系級！");
            return;
        }

        status.innerText = "資料傳送中...";

        try {
            // 發送資料到 Google Sheets
            // 注意：GAS POST 有時會遇到 CORS 問題，通常我們會加 mode: 'no-cors'
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors', // 加入這行可以避免部分瀏覽器的跨網域錯誤
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    grade: grade, // 記得把系級也傳過去
                    score: parseInt(score)
                })
            });

                // --- 在這裡加入 LocalStorage 存檔 ---
            localStorage.setItem('username', name);  // 儲存姓名
            localStorage.setItem('usergrade', grade); // 儲存系級
    // ---------
            
            // 只要沒噴錯，就顯示成功並跳轉
            status.innerHTML = "<span style='color:green'>報到成功！正在傳送至大廳...</span>";
            
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);
            
        } catch (error) {
            status.innerHTML = "<span style='color:red'>傳輸失敗，請檢查網路連線。</span>";
            console.error("Error:", error);
        }
    } // 這裡補上 submitData 的結尾括號
</script>

</body>
</html>
