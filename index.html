<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026中藥周 - 活動報到</title>
    <style>
        /* 整合後的視覺風格 */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #4a3728;
        }

        .scroll-container {
            background: #f4e4bc; /* 羊皮紙色 */
            border: 8px solid #8b4513;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding: 30px;
            width: 320px;
            text-align: center;
            border-radius: 5px;
        }

        h1 {
            color: #2d5a27; /* 墨草綠 */
            font-size: 24px;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #8b4513;
            background: rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
            font-size: 16px;
            border-radius: 3px;
        }

        button {
            background: #8b4513;
            color: white;
            border: none;
            padding: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            border-radius: 3px;
            font-weight: bold;
        }

        button:hover {
            background: #2d5a27;
            transform: scale(1.02);
        }

        #status {
            margin-top: 15px;
            font-size: 13px;
            min-height: 20px;
        }

        small {
            color: #8b4513;
            font-size: 11px;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="scroll-container">
    <h1>2026中藥周</h1>
    <p>—— 活動報到處 ——</p>
    
    <div class="input-group">
        <label>輸入姓名</label>
        <input type="text" id="username" placeholder="例：陳品翰">
    </div>

    <div class="input-group">
        <label>輸入系級</label>
        <input type="text" id="grade" placeholder="例：中醫一">
    </div>

    <div class="input-group" id="ig-group">
        <label>Instagram 帳號 (抽獎用)</label>    
        <input type="text" id="ig-account" placeholder="@your_id">
        <small>* 僅限第一次登入需填寫</small>
    </div>    

    <button onclick="submitData()" id="submit-btn">準備好了，出發！</button>
    
    <div id="status"></div>
</div>

<script>
    // 請確認這是你最新部署的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxP8aQXydPxrUvLQ-vz-0MepWDSGOPYT-ntabYPBJojtj2CqOc2pouvcIR5FJvqdc-e/exec";

    // 1. 頁面載入自動跳轉檢查
    window.onload = function() {
        if (localStorage.getItem('username') && localStorage.getItem('usergrade')) {
            window.location.href = "dashboard.html";
        }
    };

    // 2. 檢查使用者是否已存在於 Sheet 中
    async function checkUserStatus() {
        const name = document.getElementById('username').value.trim();
        const grade = document.getElementById('grade').value.trim();
        const igGroup = document.getElementById('ig-group');

        if (name && grade) {
            try {
                // 增加 t 參數防止瀏覽器快取舊資料
                const res = await fetch(`${GAS_URL}?type=user&name=${encodeURIComponent(name)}&grade=${encodeURIComponent(grade)}&t=${Date.now()}`);
                const result = await res.json();
                
                // 如果後端回傳 error 代表沒資料 -> 顯示 IG 欄位
                if (result.error === "not_found") {
                    igGroup.style.display = "block";
                } else if (Array.isArray(result)) {
                    // 如果回傳的是陣列，代表已註冊過 -> 隱藏 IG 欄位
                    igGroup.style.display = "none";
                }
            } catch (e) {
                console.log("正在檢查新玩家身分...");
            }
        }
    }

    // 監聽輸入框，離開焦點時執行檢查
    document.getElementById('username').addEventListener('blur', checkUserStatus);
    document.getElementById('grade').addEventListener('blur', checkUserStatus);

    // 3. 提交資料函數
    async function submitData() {
        const name = document.getElementById('username').value.trim();
        const grade = document.getElementById('grade').value.trim();
        const ig = document.getElementById('ig-account').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('submit-btn');

        if (!name || !grade) {
            alert("請先輸入姓名與系級！");
            return;
        }

        btn.disabled = true;
        status.innerText = "⏳ 正在感應靈力，開啟門戶...";

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    name: name,
                    grade: grade,
                    ig: ig
                })
            });

            // 存入瀏覽器快取
            localStorage.setItem('username', name);
            localStorage.setItem('usergrade', grade);
            
            status.innerHTML = "<span style='color:green'>🌿 歡迎來到百草谷！正在跳轉...</span>";
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
        } catch (error) {
            status.innerText = "❌ 傳輸失敗，請檢查網路連線。";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
