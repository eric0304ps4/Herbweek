<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026中藥周 - 活動報到</title>
    <style>
        /* 視覺風格：羊皮紙與古風 */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #4a3728;
        }

        .scroll-container {
            background: #f4e4bc; /* 羊皮紙色 */
            border: 8px solid #8b4513;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding: 40px;
            width: 350px;
            text-align: center;
            border-radius: 5px;
            position: relative;
        }

        h1 {
            color: #2d5a27; /* 墨草綠 */
            font-size: 24px;
            border-bottom: 2px solid #8b4513;
            padding-bottom: 10px;
        }

        .input-group {
            margin: 25px 0;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #8b4513;
            background: rgba(255, 255, 255, 0.5);
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background: #8b4513;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            border-radius: 3px;
        }

        button:hover {
            background: #2d5a27;
            transform: scale(1.05);
        }

        #status {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>



<div class="scroll-container">
    <h1>2026中藥周</h1>
    <p>—— 活動報到處 ——</p>
    
    <div class="input-group">
        <label>輸入姓名</label>
        <input type="text" id="username" placeholder="例：陳品翰大帥哥">
    </div>

    <div class="input-group">
        <label>輸入系級</label>
        <input type="text" id="grade" placeholder="中醫一">
    </div>

    <div class="input-group" id="ig-group">
        <label>Instagram 帳號 (抽獎用)</label>    
        <input type="text" id="ig-account" placeholder="@eric0304ps4">
        <small style="color: #8b4513; font-size: 11px;">* 僅限第一次登入需填寫</small>
    </div>    
    
    <div class="input-group" style="display:none;"> <input type="number" id="score" value="0">
    </div>

    <button onclick="submitData()">準備好了嗎？活動馬上開始</button>
    
    <div id="status"></div>
</div>

<script>
    // 你的 Google Apps Script 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx4PnrcxAI8hk-P2Y17bwlb8U9mkQG89SkACqlKQlq_R_IWR7K-5D9S3GXiD_IGKBLv/exec";
// 1. 自動檢查：如果已經登入過，直接送往大廳
    window.onload = function() {
        if (localStorage.getItem('username') && localStorage.getItem('usergrade')) {
            window.location.href = "dashboard.html";
        }
    };

    // 2. 動態檢查：當輸入完姓名與系級，檢查是否為老玩家
    async function checkUserStatus() {
        const name = document.getElementById('username').value;
        const grade = document.getElementById('grade').value;
        const igGroup = document.getElementById('ig-group');

        if (name && grade) {
            try {
                // 利用原本 checkin.html 用的查詢 API
                const res = await fetch(`${GAS_URL}?type=user&name=${encodeURIComponent(name)}&grade=${encodeURIComponent(grade)}`);
                const completedTasks = await res.json();
                
                // 如果回傳的是陣列（代表使用者已存在），就隱藏 IG 欄位
                if (Array.isArray(completedTasks) && completedTasks.length >= 0) {
                    igGroup.style.display = "none";
                } else {
                    igGroup.style.display = "block";
                }
            } catch (e) {
                console.log("新玩家或網路異常");
            }
        }
    }

    // 幫姓名和系級欄位加上「離開焦點時檢查」的事件
    document.getElementById('username').addEventListener('blur', checkUserStatus);
    document.getElementById('grade').addEventListener('blur', checkUserStatus);

    async function submitData() {
        const name = document.getElementById('username').value;
        const grade = document.getElementById('grade').value;
        const ig = document.getElementById('ig-account').value;
        const status = document.getElementById('status');

        if (!name || !grade) {
            alert("請先輸入姓名與系級！");
            return;
        }

        status.innerText = "正在開啟百草谷大門...";

        try {
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    name: name,
                    grade: grade,
                    ig: ig // 傳送 IG 帳號
                })
            });

            localStorage.setItem('username', name);
            localStorage.setItem('usergrade', grade);
            
            status.innerHTML = "<span style='color:green'>歡迎回來，正在進入大廳...</span>";
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
        } catch (error) {
            status.innerText = "傳輸失敗，請檢查網路。";
        }
    }
</script>

</body>
</html>
