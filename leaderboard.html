<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>藥材辨識榮譽殿堂</title>
    <style>
        /* 導航欄樣式 */
        .top-nav-bar {
            position: fixed; top: 10px; right: 10px;
            background: rgba(244, 228, 188, 0.9); border: 2px solid #8b4513;
            padding: 10px 15px; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 1000; text-align: right; font-size: 14px;
        }
        .challenger-info { font-weight: bold; color: #2d5a27; margin-bottom: 8px; border-bottom: 1px dashed #8b4513; padding-bottom: 5px; }
        .nav-buttons { display: flex; gap: 8px; justify-content: flex-end; }
        .nav-btn { background: #8b4513; color: white; border: none; padding: 5px 10px; cursor: pointer; text-decoration: none; font-size: 12px; border-radius: 3px; }
        .nav-btn:hover { background: #2d5a27; }

        body { background-color: #2c3e50; color: #4a3728; font-family: "Microsoft JhengHei", sans-serif; padding: 20px; padding-top: 100px; }
        .board-container { max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 30px; }
        .section { background: #f4e4bc; border: 6px double #8b4513; padding: 20px; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #2d5a27; border-bottom: 2px solid #8b4513; padding-bottom: 10px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #8b4513; color: white; padding: 10px; font-size: 14px; }
        td { border-bottom: 1px solid #8b4513; padding: 12px; text-align: center; font-size: 16px; }
        .top1 { background: rgba(255, 215, 0, 0.2); font-weight: bold; }
        .rank-value { color: #8b4513; font-weight: bold; } /* 加權分數顏色 */
        .btn-input { background: #2d5a27; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="top-nav-bar">
    <div class="challenger-info">⚔️ 當前挑戰者：<span id="display-username">讀取中...</span></div>
    <div class="nav-buttons">
        <a href="dashboard.html" class="nav-btn">🏰 大廳</a>
        <a href="index.html" class="nav-btn" onclick="return confirm('確定要登出嗎？')">🚪 登出</a>
    </div>
</div>

<div class="board-container">
    <div class="section">
        <h2>🌿 藥材辨識比賽看板</h2>
        <table>
            <thead>
                <tr>
                    <th>名次</th>
                    <th>系級</th>
                    <th>原始得分</th>
                    <th>耗時</th>
                    <th>加權總分</th> </tr>
            </thead>
            <tbody id="comp-rank-body">
                <tr><td colspan="5">正在感應靈力紀錄...</td></tr>
            </tbody>
        </table>
        <button class="btn-input" onclick="inputCompScore()">＋ 錄入藥辨比賽成績 (關主專用)</button>
    </div>

    <div class="section">
        <h2>🏆 總修為英雄榜</h2>
        <table>
            <thead>
                <tr>
                    <th>位次</th>
                    <th>系級</th>
                    <th>總修為</th>
                </tr>
            </thead>
            <tbody id="general-rank-body">
                <tr><td colspan="3">正在讀取各路英雄紀錄...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw5QYBkPUOlNSEAvohC3LcBmJTTYwE-rD0WmZwRe2e-xOpZ-zsnhTNbbQ8UBrKngiK0/exec"; // 記得換成最新部署的網址
    const MASTER_KEY = "CMU2026";

    async function loadCompetitionRank() {
        try {
            const res = await fetch(`${GAS_URL}?type=competition_rank`);
            const data = await res.json();
            document.getElementById('comp-rank-body').innerHTML = data.map((p, i) => `
                <tr class="${i===0?'top1':''}">
                    <td>${i+1}</td>
                    <td>${p.name} <br><small>${p.grade}</small></td>
                    <td>${p.score} 分</td>
                    <td>${p.time} 秒</td>
                    <td class="rank-value">${p.rankValue.toFixed(1)}</td>
                </tr>
            `).join('') || "<tr><td colspan='5'>尚未有紀錄</td></tr>";
        } catch(e) { console.error(e); }
    }

    async function loadGeneralRank() {
        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            document.getElementById('general-rank-body').innerHTML = data.map((p, i) => `
                <tr class="${i===0?'top1':''}">
                    <td>${i+1}</td>
                    <td>${p.name} <br><small>${p.grade}</small></td>
                    <td>${p.totalScore}</td>
                </tr>
            `).join('') || "<tr><td colspan='3'>尚未有紀錄</td></tr>";
        } catch(e) { console.error(e); }
    }

    async function inputCompScore() {
        const key = prompt("請關主輸入認證金鑰：");
        if (key !== MASTER_KEY) return alert("金鑰錯誤！");

        const score = prompt("請輸入比賽得分 (0-100)：");
        const time = prompt("請輸入完成秒數：");
        
        if (score && time) {
            const name = localStorage.getItem('username');
            const grade = localStorage.getItem('usergrade');

            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: "competition",
                    name: name,
                    grade: grade,
                    score: parseFloat(score),
                    time: parseFloat(time)
                })
            });
            alert("成績已更新！公式：(2*分數 + (100 - 秒數)) / 3");
            loadCompetitionRank();
        }
    }

    window.onload = () => {
        loadCompetitionRank();
        loadGeneralRank();
        const savedName = localStorage.getItem('username');
        if (savedName) document.getElementById('display-username').innerText = savedName;
    };
    
    setInterval(() => { loadCompetitionRank(); loadGeneralRank(); }, 60000);
</script>
</body>
</html>
