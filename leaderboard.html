<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥材辨識榮譽殿堂</title>
    <style>
        /* 基礎背景與字體 */
        body { 
            background-color: #2c3e50; 
            color: #4a3728; 
            font-family: "Microsoft JhengHei", sans-serif; 
            padding: 10px; 
            padding-top: 100px; 
            margin: 0;
        }
    
        /* 頂部選單導航 */
        .top-nav-menu { position: fixed; top: 15px; right: 15px; z-index: 1000; text-align: right; }
        .menu-toggle-btn {
            width: 50px; height: 50px; background: #8b4513; color: #f4e4bc;
            border: 3px double #f4e4bc; border-radius: 50%; font-size: 24px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center; transition: 0.3s;
        }
        .menu-content {
            display: none; background: rgba(244, 228, 188, 0.95);
            border: 3px solid #8b4513; padding: 15px; margin-top: 10px;
            border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            min-width: 180px; animation: fadeIn 0.3s ease;
        }
        .menu-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
        .challenger-info { font-weight: bold; color: #2d5a27; margin-bottom: 10px; border-bottom: 1px dashed #8b4513; padding-bottom: 5px; font-size: 14px; }
        .nav-buttons { display: flex; flex-direction: column; gap: 10px; }
        .nav-row { display: flex; gap: 5px; justify-content: flex-end; }
        .nav-btn { background: #8b4513; color: white; border: none; padding: 5px 10px; cursor: pointer; text-decoration: none; font-size: 12px; border-radius: 3px; }
    
        /* 排行榜容器 */
        .board-container { max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .section { background: #f4e4bc; border: 6px double #8b4513; padding: 15px; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #2d5a27; border-bottom: 2px solid #8b4513; padding-bottom: 10px; margin-top: 0; font-size: 20px; }
        
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; } 
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #8b4513; color: white; padding: 10px 5px; font-size: 14px; white-space: nowrap; }
        td { border-bottom: 1px solid #8b4513; padding: 10px 5px; text-align: center; font-size: 15px; }
        .top1 { background: rgba(255, 215, 0, 0.2); font-weight: bold; }
        .rank-value { color: #8b4513; font-weight: bold; }
        .btn-input { background: #2d5a27; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; border-radius: 5px; font-size: 16px; }
    
        /* 手機版優化 */
        @media (max-width: 600px) {
            .mobile-hide { display: none; }
            td, th { font-size: 13px; padding: 8px 3px; }
            h2 { font-size: 18px; }
            body { padding-top: 80px; }
        }
    </style>
</head>
<body>

<div class="top-nav-menu">
    <button class="menu-toggle-btn" onclick="toggleMenu()" id="main-menu-btn">📜</button>
    <div class="menu-content" id="nav-menu-content">
        <div class="challenger-info">⚔️ 當前挑戰者 <span id="display-username">讀取中...</span></div>
        <div class="nav-buttons">
            <div class="music-control">
                <button id="music-btn" onclick="toggleMusic()" style="width:100%; border:1px solid #8b4513; background:#2d5a27; color:#f4e4bc; padding:5px; border-radius:3px;">🎵 播放音樂</button>
                <audio id="bg-music" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
            </div>
            <div class="nav-row">
                <a href="dashboard.html" class="nav-btn" style="flex:1; text-align:center;">🏰 大廳</a>
                <a href="index.html" class="nav-btn" style="flex:1; text-align:center;" onclick="return confirm('確定登出？')">🚪 登出</a>
            </div>
        </div>
    </div>
</div>

<div class="board-container">
    <div class="section">
        <h2>🌿 藥材辨識比賽看板</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>名次</th>
                        <th>系級</th>
                        <th class="mobile-hide">原始得分</th> 
                        <th class="mobile-hide">耗時</th>     
                        <th>加權總分</th> 
                    </tr>
                </thead>
                <tbody id="comp-rank-body">
                    <tr><td colspan="5">正在讀取紀錄...</td></tr>
                </tbody>
            </table>
        </div>
        <button class="btn-input" onclick="inputCompScore()">＋ 錄入藥辨比賽成績 (關主專用)</button>
    </div>

    <div class="section">
        <h2>🏆 總分英雄榜</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>位次</th>
                        <th>系級</th>
                        <th>總分</th>
                    </tr>
                </thead>
                <tbody id="general-rank-body">
                    <tr><td colspan="3">正在讀取各路英雄紀錄...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby_JioT4OHfu0kDzDMTJW-X53af8nPv6h5E5DDwY9XAayeKxhAHaunvwUFCEEdfvrG4/exec"; 
    const MASTER_KEY = "CMU2026";

    // 核心初始化
    window.onload = () => {
        loadCompetitionRank();
        loadGeneralRank();
        checkWorldAnnouncement(); // 啟動公告檢查
        
        const savedName = localStorage.getItem('username');
        if (savedName) document.getElementById('display-username').innerText = savedName;

        // 設定定時任務
        setInterval(() => { loadCompetitionRank(); loadGeneralRank(); }, 60000);
        setInterval(checkWorldAnnouncement, 20000); // 每 20 秒檢查一次是否有新第一名
    };

    async function loadCompetitionRank() {
        try {
            const res = await fetch(`${GAS_URL}?type=competition_rank&t=${new Date().getTime()}`);
            const data = await res.json();
            document.getElementById('comp-rank-body').innerHTML = data.map((p, i) => `
                <tr class="${i===0?'top1':''}">
                    <td>${i+1}</td>
                    <td>${p.name} <br><small>${p.grade}</small></td>
                    <td class="mobile-hide">${p.score} 分</td> 
                    <td class="mobile-hide">${p.time} 秒</td>   
                    <td class="rank-value">${p.rankValue.toFixed(1)}</td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function loadGeneralRank() {
        try {
            const res = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
            const data = await res.json();
            document.getElementById('general-rank-body').innerHTML = data.map((p, i) => `
                <tr class="${i===0?'top1':''}">
                    <td>${i+1}</td>
                    <td>${p.name} <br><small>${p.grade}</small></td>
                    <td>${p.totalScore}</td>
                </tr>
            `).join('') || "<tr><td colspan='3'>尚未有紀錄</td></tr>";
        } catch(e) { console.error(e); }
    }

    async function inputCompScore() {
        const key = prompt("請關主輸入認證金鑰：");
        if (key !== MASTER_KEY) return alert("金鑰錯誤！");
        const score = prompt("請輸入比賽得分 (0-100)：");
        const time = prompt("請輸入完成秒數：");
        
        if (score && time) {
            const name = localStorage.getItem('username');
            const grade = localStorage.getItem('usergrade');
            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "competition", name: name, grade: grade, score: parseFloat(score), time: parseFloat(time) })
            });
            alert("成績已更新！公式：(2*分數 + (300 - 秒數)/3) / 3");
            loadCompetitionRank();
            setTimeout(checkWorldAnnouncement, 2000); // 錄入後立刻檢查一次公告
        }
    }

    // 音樂與選單邏輯
    function toggleMusic() {
        const music = document.getElementById('bg-music');
        const btn = document.getElementById('music-btn');
        if (music.paused) {
            music.play();
            btn.innerText = "🔇 靜音";
            btn.classList.add('playing');
            localStorage.setItem('musicStatus', 'on');
        } else {
            music.pause();
            btn.innerText = "🎵 播放音樂";
            btn.classList.remove('playing');
            localStorage.setItem('musicStatus', 'off');
        }
    }

    function toggleMenu() {
        const menu = document.getElementById('nav-menu-content');
        const btn = document.getElementById('main-menu-btn');
        menu.classList.toggle('active');
        btn.innerText = menu.classList.contains('active') ? "❌" : "📜";
    }

    window.addEventListener('click', (e) => {
        const menu = document.getElementById('nav-menu-content');
        const btn = document.getElementById('main-menu-btn');
        if (!menu.contains(e.target) && !btn.contains(e.target)) {
            menu.classList.remove('active');
            btn.innerText = "📜";
        }
    });

    // 公告系統
    let lastKingName = null; 
    async function checkWorldAnnouncement() {
        try {
            const res = await fetch(`${GAS_URL}?type=competition_rank&t=${new Date().getTime()}`);
            const data = await res.json();
            if (data.length > 0) {
                const currentKing = data[0];
                if (lastKingName === null) {
                    lastKingName = currentKing.name;
                    return;
                }
                if (currentKing.name !== lastKingName) {
                    Swal.fire({
                        title: '🎊 全服公告：新任藥王誕生！',
                        html: `恭喜 <b style="color:#8b4513; font-size:24px;">${currentKing.name}</b> 拔得頭籌！<br>目前暫居第一！`,
                        icon: 'success',
                        background: '#f4e4bc',
                        confirmButtonColor: '#8b4513',
                        backdrop: `rgba(0,0,123,0.4) url("https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndnB3Znd4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4Z3R4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKMGpxn6YvXqL9S/giphy.gif") left top no-repeat`
                    });
                    lastKingName = currentKing.name;
                }
            }
        } catch (e) { console.error("公告感應失敗", e); }
    }
</script>
</body>
</html>
