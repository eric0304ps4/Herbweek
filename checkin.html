<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>望聞問切 - 修煉之路</title>
    <style>
        body { background-color: #2c3e50; font-family: "Microsoft JhengHei", sans-serif; color: #4a3728; padding: 20px; }
        .container { background: #f4e4bc; border: 5px solid #8b4513; max-width: 500px; margin: auto; padding: 20px; border-radius: 10px; }
        .day-tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #8b4513; padding-bottom: 10px; }
        .day-tab { cursor: pointer; padding: 5px 10px; font-weight: bold; border: 1px solid transparent; }
        .day-tab.active { border: 1px solid #8b4513; background: #8b4513; color: white; border-radius: 5px; }
        
        .task-list { display: none; }
        .task-list.active { display: block; }
        
        .task-item { 
            background: rgba(139, 69, 19, 0.1); 
            margin: 10px 0; 
            padding: 15px; 
            border-left: 5px solid #8b4513;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn-verify { background: #2d5a27; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 3px; }
        .completed { background: #d4edda; border-left-color: #28a745; }
        .completed .btn-verify { display: none; }
        .completed::after { content: "✓ 已認證"; color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
<div class="container">
    <h2 style="text-align:center; color:#2d5a27;">📜 望聞問切：五日修煉</h2>
    
    <div class="day-tabs">
        <div class="day-tab active" id="tab1" onclick="showDay(1)">第一日</div>
        <div class="day-tab" id="tab2" onclick="showDay(2)">第二日</div>
        <div class="day-tab" id="tab3" onclick="showDay(3)">第三日</div>
        <div class="day-tab" id="tab4" onclick="showDay(4)">第四日</div>
        <div class="day-tab" id="tab5" onclick="showDay(5)">第五日</div>
    </div>

    <div id="day1" class="task-list active">
        <div class="task-item" id="D1-1"> <span>壹、望</span> <button class="btn-verify" onclick="verifyTask('D1-1')">關主認證</button> </div>
        <div class="task-item" id="D1-2"> <span>貳、聞</span> <button class="btn-verify" onclick="verifyTask('D1-2')">關主認證</button> </div>
        <div class="task-item" id="D1-3"> <span>參、問</span> <button class="btn-verify" onclick="verifyTask('D1-3')">關主認證</button> </div>
        <div class="task-item" id="D1-4"> <span>肆、切</span> <button class="btn-verify" onclick="verifyTask('D1-4')">關主認證</button> </div>
        <div class="task-item" id="D1-5"> <span>伍、抓藥挑戰</span> <button class="btn-verify" onclick="verifyTask('D1-5')">關主認證</button> </div>
    </div>

    <div id="day2" class="task-list active">
        <div class="task-item" id="D2-1"> <span>壹、望</span> <button class="btn-verify" onclick="verifyTask('D1-1')">關主認證</button> </div>
        <div class="task-item" id="D2-2"> <span>貳、聞</span> <button class="btn-verify" onclick="verifyTask('D1-2')">關主認證</button> </div>
        <div class="task-item" id="D2-3"> <span>參、問</span> <button class="btn-verify" onclick="verifyTask('D1-3')">關主認證</button> </div>
        <div class="task-item" id="D2-4"> <span>肆、切</span> <button class="btn-verify" onclick="verifyTask('D1-4')">關主認證</button> </div>
        <div class="task-item" id="D2-5"> <span>伍、抓藥挑戰</span> <button class="btn-verify" onclick="verifyTask('D1-5')">關主認證</button> </div>
    </div>

    <div id="day2" class="task-list active">
        <div class="task-item" id="D3-1"> <span>壹、望</span> <button class="btn-verify" onclick="verifyTask('D1-1')">關主認證</button> </div>
        <div class="task-item" id="D3-2"> <span>貳、聞</span> <button class="btn-verify" onclick="verifyTask('D1-2')">關主認證</button> </div>
        <div class="task-item" id="D3-3"> <span>參、問</span> <button class="btn-verify" onclick="verifyTask('D1-3')">關主認證</button> </div>
        <div class="task-item" id="D3-4"> <span>肆、切</span> <button class="btn-verify" onclick="verifyTask('D1-4')">關主認證</button> </div>
        <div class="task-item" id="D3-5"> <span>伍、抓藥挑戰</span> <button class="btn-verify" onclick="verifyTask('D1-5')">關主認證</button> </div>
    </div>

    <div id="day2" class="task-list active">
        <div class="task-item" id="D4-1"> <span>壹、望</span> <button class="btn-verify" onclick="verifyTask('D1-1')">關主認證</button> </div>
        <div class="task-item" id="D4-2"> <span>貳、聞</span> <button class="btn-verify" onclick="verifyTask('D1-2')">關主認證</button> </div>
        <div class="task-item" id="D4-3"> <span>參、問</span> <button class="btn-verify" onclick="verifyTask('D1-3')">關主認證</button> </div>
        <div class="task-item" id="D4-4"> <span>肆、切</span> <button class="btn-verify" onclick="verifyTask('D1-4')">關主認證</button> </div>
        <div class="task-item" id="D4-5"> <span>伍、抓藥挑戰</span> <button class="btn-verify" onclick="verifyTask('D1-5')">關主認證</button> </div>
    </div>

    <div id="day2" class="task-list active">
        <div class="task-item" id="D5-1"> <span>壹、望</span> <button class="btn-verify" onclick="verifyTask('D1-1')">關主認證</button> </div>
        <div class="task-item" id="D5-2"> <span>貳、聞</span> <button class="btn-verify" onclick="verifyTask('D1-2')">關主認證</button> </div>
        <div class="task-item" id="D5-3"> <span>參、問</span> <button class="btn-verify" onclick="verifyTask('D1-3')">關主認證</button> </div>
        <div class="task-item" id="D5-4"> <span>肆、切</span> <button class="btn-verify" onclick="verifyTask('D1-4')">關主認證</button> </div>
        <div class="task-item" id="D5-5"> <span>伍、抓藥挑戰</span> <button class="btn-verify" onclick="verifyTask('D1-5')">關主認證</button> </div>
    </div>
</div>

<script>
    // 1. 必須定義 GAS_URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyY3ScAVhA57OcmUW4QFHmJ2Ofd5MJr06legZXizVtpQwyKZgM5CzYeQS7bNQvmcXB5/exec";
    const MASTER_KEY = "CMU2026"; 

    // 2. 頁面載入時同步雲端進度
    window.onload = async function() {
        const savedName = localStorage.getItem('username');
        const savedGrade = localStorage.getItem('usergrade');

        if (!savedName) {
            alert("找不到報到資料，請重新報到！");
            window.location.href = "index.html";
            return;
        }

        try {
            // 向 GAS 請求進度 (需搭配我上一則訊息給你的新版 GAS doGet)
            const response = await fetch(`${GAS_URL}?type=user&name=${encodeURIComponent(savedName)}&grade=${encodeURIComponent(savedGrade)}`);
            const completedTasks = await response.json();

            completedTasks.forEach(taskId => {
                const el = document.getElementById(taskId);
                if (el) el.classList.add('completed');
            });
        } catch (e) {
            console.error("同步失敗:", e);
        }
    };

    // 3. 切換天數邏輯
    function showDay(d) {
        document.querySelectorAll('.task-list').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.day-tab').forEach(el => el.classList.remove('active'));
        
        document.getElementById('day' + d).classList.add('active');
        document.getElementById('tab' + d).classList.add('active');
    }

    // 4. 認證邏輯
    async function verifyTask(taskId) {
        const key = prompt("請關主輸入認證金鑰：");
        
        if (key === MASTER_KEY) {
            const savedName = localStorage.getItem('username');
            const savedGrade = localStorage.getItem('usergrade');
    
            if (!savedName) {
                alert("找不到你的報到資料，請先回首頁報到！");
                window.location.href = "index.html";
                return;
            }
    
            // 立即改變 UI
            document.getElementById(taskId).classList.add('completed');
            
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        name: savedName, 
                        grade: savedGrade, 
                        task: taskId 
                    })
                });
                alert(`${savedName} 同學，此關修為已錄入！`);
            } catch (e) {
                alert("網路不穩，資料可能未成功上傳，請通知管理員。");
            }
        } else {
            alert("金鑰錯誤，關主尚未認可。");
        }
    }
</script>
</body>
</html>
