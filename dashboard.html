<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百草谷大殿 - 選擇修煉路徑</title>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #4a3728;
        }

        .dashboard-container {
            background: #f4e4bc;
            border: 8px solid #8b4513;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding: 40px;
            width: 400px;
            text-align: center;
            border-radius: 5px;
        }

        h1 {
            color: #2d5a27;
            font-size: 28px;
            margin-bottom: 10px;
            border-bottom: 2px dashed #8b4513;
            padding-bottom: 10px;
        }

        .welcome-text {
            font-size: 18px;
            margin-bottom: 30px;
            font-style: italic;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .rpg-button {
            background: #8b4513;
            color: #f4e4bc;
            border: 3px double #f4e4bc;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: block;
            font-weight: bold;
        }

        .rpg-button:hover {
            background: #2d5a27; /* 變綠色代表選中 */
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .rpg-button span {
            display: block;
            font-size: 14px;
            font-weight: normal;
            margin-top: 5px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>百草谷大殿</h1>
    <p class="welcome-text">少俠，請選擇今日的修行路徑：</p>

    <div class="menu-options">
        <a href="checkin.html" class="rpg-button">
            📜 闖關簽到
            <span>( 簽署同盟，累積修為 )</span>
        </a>

        <a href="leaderboard.html" class="rpg-button">
            🏆 藥材辨識排行榜
            <span>( 觀察各路英雄之修為 )</span>
        </a>
    </div>
    
    <p style="margin-top: 30px; font-size: 12px; color: #8b4513;">—— 岐黃護法 守護中 ——</p>
</div>

</body>
</html>
